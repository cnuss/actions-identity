name: 'Actions Identity'
description: 'Expose the GitHub Actions runtime token and URL (injected by the runner into node actions) as step outputs.'
author: 'cnuss'
branding:
  icon: 'key'
  color: 'purple'

# No inputs for now.

outputs:
  runtime-token:
    description: 'ACTIONS_RUNTIME_TOKEN — the per-job VSS system-connection bearer the runner injects into node/docker actions. Masked in logs.'
  runtime-url:
    description: 'ACTIONS_RUNTIME_URL — the pipelines service base URL for this job.'
  results-url:
    description: 'ACTIONS_RESULTS_URL — the results/cache/artifact Twirp service base URL.'
  cache-url:
    description: 'ACTIONS_CACHE_URL — the legacy artifactcache service base URL.'
  token:
    description: 'Alias of runtime-token.'

runs:
  using: 'node20'
  main: 'index.js'
